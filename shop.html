<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic document setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NovaMart | Shop</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body data-page="shop">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">NovaMart</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="shop.html">Shop</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="cart.html">
              Cart
              <span id="cartCount" class="badge bg-warning text-dark">0</span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="portfolio.html">Portfolio</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page header -->
  <header class="page-header bg-light">
    <div class="container">
      <h1 class="fw-bold">Shop Products</h1>
      <p class="text-muted mb-0">
        Search, filter, sort, and add products to your cart.
      </p>
    </div>
  </header>

  <!-- Products section -->
  <main class="section-padding">
    <div class="container">

      <!-- Search, filter, and sort controls -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-lg-5">
              <label for="searchInput" class="form-label">Search Product</label>
              <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Search by product name..."
              />
            </div>

            <div class="col-lg-3">
              <label for="categoryFilter" class="form-label">Category</label>
              <select id="categoryFilter" class="form-select">
                <option value="all">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Home">Home</option>
                <option value="Accessories">Accessories</option>
              </select>
            </div>

            <div class="col-lg-4">
              <label for="sortSelect" class="form-label">Sort Products</label>
              <select id="sortSelect" class="form-select">
                <option value="default">Default</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="name-az">Name: A to Z</option>
                <option value="rating-high">Rating: High to Low</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Product count -->
      <p id="productCount" class="text-muted"></p>

      <!-- Product cards will be inserted by JavaScript -->
      <div id="productsGrid" class="row g-4"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer bg-dark text-white text-center py-4">
    <div class="container">
      <p class="mb-1">&copy; 2026 NovaMart. All rights reserved.</p>
      <small>Search, filter, sort, and cart functionality included.</small>
    </div>
  </footer>

  <!-- JavaScript files -->
  <script src="assets/js/products.js"></script>
  <script src="assets/js/main.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
