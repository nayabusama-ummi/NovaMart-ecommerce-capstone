<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic document setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NovaMart | Checkout</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body data-page="checkout">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">NovaMart</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="shop.html">Shop</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="cart.html">
              Cart
              <span id="cartCount" class="badge bg-warning text-dark">0</span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="portfolio.html">Portfolio</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page header -->
  <header class="page-header bg-light">
    <div class="container">
      <h1 class="fw-bold">Checkout</h1>
      <p class="text-muted mb-0">
        UI-only checkout with form validation. No real payment is processed.
      </p>
    </div>
  </header>

  <!-- Checkout section -->
  <main class="section-padding">
    <div class="container">
      <div class="row g-4">

        <!-- Checkout form -->
        <div class="col-lg-7">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h3 class="mb-4">Customer Details</h3>

              <div id="checkoutMessage"></div>

              <form id="checkoutForm" novalidate>
                <div class="mb-3">
                  <label for="fullName" class="form-label">Full Name</label>
                  <input type="text" id="fullName" class="form-control" />
                  <small id="fullNameError" class="error-text"></small>
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Email Address</label>
                  <input type="email" id="email" class="form-control" />
                  <small id="emailError" class="error-text"></small>
                </div>

                <div class="mb-3">
                  <label for="phone" class="form-label">Phone Number</label>
                  <input
                    type="text"
                    id="phone"
                    class="form-control"
                    placeholder="Example: +92 300 1234567"
                  />
                  <small id="phoneError" class="error-text"></small>
                </div>

                <div class="mb-3">
                  <label for="address" class="form-label">Address</label>
                  <textarea id="address" class="form-control" rows="3"></textarea>
                  <small id="addressError" class="error-text"></small>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="city" class="form-label">City</label>
                    <input type="text" id="city" class="form-control" />
                    <small id="cityError" class="error-text"></small>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label for="postalCode" class="form-label">Postal Code</label>
                    <input type="text" id="postalCode" class="form-control" />
                    <small id="postalCodeError" class="error-text"></small>
                  </div>
                </div>

                <button type="submit" class="btn btn-success w-100">
                  Place Order
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Order summary -->
        <div class="col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h3 class="mb-4">Order Summary</h3>

              <!-- JavaScript will render order summary here -->
              <div id="checkoutSummary"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer bg-dark text-white text-center py-4">
    <div class="container">
      <p class="mb-1">&copy; 2026 NovaMart. All rights reserved.</p>
      <small>Checkout form validation included.</small>
    </div>
  </footer>

  <!-- JavaScript files -->
  <script src="assets/js/products.js"></script>
  <script src="assets/js/main.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
