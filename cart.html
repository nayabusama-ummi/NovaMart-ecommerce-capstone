<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic document setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NovaMart | Cart</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body data-page="cart">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">NovaMart</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="shop.html">Shop</a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="cart.html">
              Cart
              <span id="cartCount" class="badge bg-warning text-dark">0</span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="portfolio.html">Portfolio</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page header -->
  <header class="page-header bg-light">
    <div class="container">
      <h1 class="fw-bold">Your Cart</h1>
      <p class="text-muted mb-0">
        Update quantities, remove products, and review your total.
      </p>
    </div>
  </header>

  <!-- Cart content -->
  <main class="section-padding">
    <div class="container">

      <!-- JavaScript will render the complete cart here -->
      <div id="cartContent"></div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer bg-dark text-white text-center py-4">
    <div class="container">
      <p class="mb-1">&copy; 2026 NovaMart. All rights reserved.</p>
      <small>Cart data is saved using localStorage.</small>
    </div>
  </footer>

  <!-- JavaScript files -->
  <script src="assets/js/products.js"></script>
  <script src="assets/js/main.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
